# Opt-in CodSpeed benchmarking for pull requests, gated by labels and
# sharded one job per selected crate.
#
# Label convention (managed manually on each PR):
#
#   bench:all                        # all 11 bench-bearing crates
#   bench:<crate>                    # just that crate
#   bench:<crate> bench:<crate>      # union
#
# Where <crate> is a workspace member name, e.g. `bench:arrow`,
# `bench:parquet`, `bench:arrow-cast`. `bench:all` short-circuits and
# supersedes any per-crate labels.
#
# The matrix is computed dynamically by the `setup` job from the
# current label set, so each labeled crate fans out into its own
# parallel job. Sharding is required because the full workspace
# produces >1000 benchmarks (CodSpeed's per-upload limit); jobs in the
# same workflow are auto-aggregated into a single report.
# https://codspeed.io/docs/features/sharded-benchmarks
#
# Authorization: only users with write access to the repo can add
# labels, so the label is itself the authorization gate.
#
# Baseline: native `pull_request` event → CodSpeed compares against
# the base branch's latest CodSpeed report automatically.
#
# Fork PR caveat: workflows triggered by `pull_request` from fork PRs
# do not get an OIDC token. For benches on fork PRs, push the branch
# to this repo and label it there.

name: codspeed-pr

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  setup:
    # Compute the matrix only if at least one `bench:*` label is
    # currently attached. The toJSON serialization wraps each label
    # name in double quotes, so searching for `"bench:` matches only
    # at the start of a label name.
    if: contains(toJSON(github.event.pull_request.labels.*.name), '"bench:')
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.scope.outputs.crates }}
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Resolve bench scope from labels
        id: scope
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          all_crates='["arrow","arrow-array","arrow-avro","arrow-buffer","arrow-cast","arrow-ipc","arrow-json","arrow-schema","parquet","parquet-variant","parquet-variant-compute"]'

          # Pull out the suffix of every `bench:*` label.
          suffixes=$(jq -r '.[] | select(startswith("bench:")) | sub("^bench:"; "")' <<<"$LABELS")

          if echo "$suffixes" | grep -qx "all"; then
            echo "crates=$all_crates" >> "$GITHUB_OUTPUT"
            echo "scope=full workspace (bench:all)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate each suffix against a strict allowlist and build a
          # JSON array for the dynamic matrix consumer.
          for pkg in $suffixes; do
            if ! [[ "$pkg" =~ ^[a-z][a-z0-9_-]*$ ]]; then
              echo "::error::Invalid bench label suffix 'bench:$pkg' — expected a workspace member name"
              exit 1
            fi
          done

          crates_json=$(jq -Rcn '[inputs]' <<<"$suffixes")
          echo "crates=$crates_json" >> "$GITHUB_OUTPUT"
          echo "scope=$(echo $suffixes | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

  bench:
    needs: setup
    name: Bench ${{ matrix.crate }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.setup.outputs.crates) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build benchmarks
        # Every shard builds the same full workspace with the same
        # feature set. Keeping the build identical across shards keeps
        # rust-cache keys stable and dodges the cross-crate-feature
        # restriction cargo enforces under a single-crate -p.
        run: |
          echo "::notice::Bench scope: ${{ needs.setup.outputs.scope }}"
          cargo codspeed build --workspace \
            --features arrow/test_utils,arrow-schema/ffi,parquet/test_common,parquet/experimental,parquet/async,parquet/object_store

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.crate }}
