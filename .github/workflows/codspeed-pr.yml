# Opt-in CodSpeed benchmarking for pull requests, gated by labels.
#
# Label convention (managed manually on each PR):
#
#   bench:all                        # build & run every workspace bench
#   bench:<crate>                    # run benches for one crate
#   bench:<crate> bench:<crate>      # union; runs benches in both crates
#
# Where <crate> is the workspace member name, e.g. `bench:arrow`,
# `bench:parquet`, `bench:arrow-cast`, etc. `bench:all` collapses to
# `--workspace` and supersedes any per-crate labels.
#
# Authorization: only users with write access to the repo can add labels
# to a PR, so the label is itself the authorization gate. No extra
# author_association check is needed.
#
# Baseline: native `pull_request` event → CodSpeed compares against the
# base branch's latest CodSpeed report automatically; no env spoofing
# required (contrast with the comment-trigger variant).
#
# Fork PR caveat: workflows triggered by `pull_request` from fork PRs do
# not get an OIDC token. For benches on fork PRs, push the branch to this
# repo and add labels there.

name: codspeed-pr

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  bench:
    # Run only if at least one label whose name starts with `bench:` is
    # currently attached to the PR. The toJSON serialization wraps each
    # label name in double quotes, so searching for `"bench:` matches
    # only at the start of a label name (not a label that happens to
    # contain `bench:` mid-string).
    if: contains(toJSON(github.event.pull_request.labels.*.name), '"bench:')
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Resolve bench scope from labels
        id: scope
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # Pull out the suffix of every `bench:*` label.
          suffixes=$(jq -r '.[] | select(startswith("bench:")) | sub("^bench:"; "")' <<<"$LABELS")

          if echo "$suffixes" | grep -qx "all"; then
            echo "args=--workspace" >> "$GITHUB_OUTPUT"
            echo "scope=full workspace (bench:all)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pkg_args=""
          scope_pretty=""
          for pkg in $suffixes; do
            # Strict allowlist so nothing user-controlled reaches the shell
            # unescaped. Workspace member names in arrow-rs all match this.
            if ! [[ "$pkg" =~ ^[a-z][a-z0-9_-]*$ ]]; then
              echo "::error::Invalid bench label suffix 'bench:$pkg' — expected a workspace member name"
              exit 1
            fi
            pkg_args="$pkg_args -p $pkg"
            scope_pretty="$scope_pretty $pkg"
          done

          echo "args=$pkg_args" >> "$GITHUB_OUTPUT"
          echo "scope=$scope_pretty" >> "$GITHUB_OUTPUT"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build benchmarks
        # Always build the full workspace: cross-crate features like
        # `parquet/object_store` can't be passed when -p limits the
        # build set to a single crate, and the build is cached. Bench
        # selection happens at run time via `cargo codspeed run`.
        run: |
          echo "::notice::Run scope:${{ steps.scope.outputs.scope }}"
          cargo codspeed build --workspace \
            --features arrow/test_utils,arrow-schema/ffi,parquet/test_common,parquet/experimental,parquet/async,parquet/object_store

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run $ARGS
        env:
          ARGS: ${{ steps.scope.outputs.args }}
