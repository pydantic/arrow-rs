# On-demand CodSpeed runs triggered from PR comments.
#
# A comment of the form:
#
#     run codspeed                       # build & run all workspace benches
#     run codspeed <bench>               # run a single bench target
#     run codspeed <bench> <bench> ...   # run several bench targets
#
# kicks off a CodSpeed instrumentation run against the PR's head commit.
# Each whitespace-separated token after `run codspeed` is passed to
# cargo-codspeed via `--bench <token>` (repeatable). Tokens are validated
# against a strict allowlist before being forwarded to the shell.
#
# Authorization: the commenter must have the OWNER, MEMBER, or COLLABORATOR
# author_association on the PR — i.e. they have at least write access to
# the repo. External contributors cannot trigger billed runs.
#
# Baseline selection: CodSpeed only compares against the base branch when
# it sees a `pull_request` event. `issue_comment` events have
# GITHUB_REF=refs/heads/<default-branch>, which would make CodSpeed compare
# the run against the previous commit on the default branch instead of the
# PR's base. We therefore synthesize a pull_request event payload and
# override GITHUB_EVENT_NAME/GITHUB_REF/GITHUB_EVENT_PATH/GITHUB_BASE_REF
# on the CodSpeed step.

name: codspeed-comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  trigger:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, 'run codspeed') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket

      - name: Resolve PR & synthesize pull_request event context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          # CodSpeed's runner only treats a run as a PR (and therefore picks
          # the base-branch report as the baseline) when GITHUB_EVENT_NAME is
          # `pull_request`, GITHUB_REF matches refs/pull/<N>/merge, and
          # GITHUB_EVENT_PATH points at a payload with `pull_request.{head,base}`
          # objects. Under `issue_comment` none of that is true, so we
          # synthesize a minimal event file with exactly the fields the runner
          # reads (see CodSpeedHQ/codspeed src/run_environment/github_actions/provider.rs).
          pr_json=$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}")

          head_sha=$(jq -r .head.sha <<<"$pr_json")
          head_ref=$(jq -r .head.ref <<<"$pr_json")
          base_ref=$(jq -r .base.ref <<<"$pr_json")
          head_repo_id=$(jq -r .head.repo.id <<<"$pr_json")
          base_repo_id=$(jq -r .base.repo.id <<<"$pr_json")
          head_repo_owner=$(jq -r .head.repo.owner.login <<<"$pr_json")
          repo_private=$(jq -r .head.repo.private <<<"$pr_json")

          synth_path="${RUNNER_TEMP}/codspeed-pr-event.json"
          jq -n \
            --argjson head_repo_id "$head_repo_id" \
            --argjson base_repo_id "$base_repo_id" \
            --arg head_ref "$head_ref" \
            --arg base_ref "$base_ref" \
            --arg head_repo_owner "$head_repo_owner" \
            --argjson private "$repo_private" \
            '{
              repository: { private: $private },
              pull_request: {
                head: {
                  ref: $head_ref,
                  repo: { id: $head_repo_id, owner: { login: $head_repo_owner } }
                },
                base: {
                  ref: $base_ref,
                  repo: { id: $base_repo_id }
                }
              }
            }' > "$synth_path"

          {
            echo "sha=$head_sha"
            echo "ref=$head_ref"
            echo "base_ref=$base_ref"
            echo "event_path=$synth_path"
          } >> "$GITHUB_OUTPUT"

      - name: Parse bench filter from comment
        id: parse
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          # Strip the "run codspeed" prefix; remaining tokens are bench
          # target names. Validate each token against a strict allowlist
          # so nothing user-controlled reaches the shell unescaped.
          rest="${BODY#run codspeed}"
          rest="$(echo "$rest" | tr -d '\r' | head -n1 | xargs || true)"

          bench_args=""
          for tok in $rest; do
            if ! [[ "$tok" =~ ^[A-Za-z0-9_-]+$ ]]; then
              echo "::error::Invalid bench name '$tok' — only [A-Za-z0-9_-] allowed"
              exit 1
            fi
            bench_args="$bench_args --bench $tok"
          done

          echo "args=$bench_args" >> "$GITHUB_OUTPUT"
          if [ -z "$bench_args" ]; then
            echo "scope=workspace (all benches)" >> "$GITHUB_OUTPUT"
          else
            echo "scope=$rest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.sha }}
          submodules: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build benchmarks
        env:
          BENCH_ARGS: ${{ steps.parse.outputs.args }}
        run: |
          if [ -z "$BENCH_ARGS" ]; then
            cargo codspeed build --workspace
          else
            cargo codspeed build --workspace $BENCH_ARGS
          fi

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: instrumentation
          run: |
            if [ -z "${BENCH_ARGS}" ]; then
              cargo codspeed run --workspace
            else
              cargo codspeed run --workspace ${BENCH_ARGS}
            fi
        env:
          BENCH_ARGS: ${{ steps.parse.outputs.args }}
          # Override the issue_comment event context so CodSpeed treats this
          # as a pull_request run and compares against the base branch's
          # latest CodSpeed report instead of the previous commit on main.
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF: refs/pull/${{ github.event.issue.number }}/merge
          GITHUB_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          GITHUB_HEAD_REF: ${{ steps.pr.outputs.ref }}
          GITHUB_EVENT_PATH: ${{ steps.pr.outputs.event_path }}
          GITHUB_SHA: ${{ steps.pr.outputs.sha }}

      - name: Comment failure on PR
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f body="CodSpeed run requested by @${{ github.event.comment.user.login }} failed. See [the workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
