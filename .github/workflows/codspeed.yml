# Continuous benchmarking on CodSpeed.
#
# Runs the full workspace bench suite on every push to main. PR runs are
# opt-in via the `run codspeed [bench]...` comment trigger (see
# codspeed-comment.yml). Auth is via GitHub OIDC; CodSpeed's public-repo
# integration accepts the workflow's `id-token` claim, so no secret token
# is required.
#
# The `criterion` workspace dependency is renamed to
# `codspeed-criterion-compat`, so existing `use criterion::*` benches work
# unmodified; outside of CodSpeed the compat layer falls back to standard
# criterion behavior.

name: codspeed

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build benchmarks
        # The --features list enables every feature that any workspace
        # bench target gates behind `required-features`. Without these,
        # those bench targets silently aren't built.
        run: |
          cargo codspeed build --workspace \
            --features arrow/test_utils,arrow-schema/ffi,parquet/test_common,parquet/experimental,parquet/async,parquet/object_store

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run --workspace
