# Continuous benchmarking on CodSpeed.
#
# Runs the full workspace bench suite on every push to main, sharded
# one job per bench-bearing crate. Sharding is required because the
# full workspace produces >1000 benchmarks, which is CodSpeed's
# per-upload limit; jobs in the same workflow are auto-aggregated into
# a single report.
# https://codspeed.io/docs/features/sharded-benchmarks
#
# Auth is via GitHub OIDC; the workflow's `id-token` claim is what
# CodSpeed verifies, so no secret token is required.
#
# The `criterion` workspace dependency is renamed to
# `codspeed-criterion-compat`, so existing `use criterion::*` benches
# work unmodified; outside of CodSpeed the compat layer falls back to
# standard criterion behavior.

name: codspeed

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  bench:
    name: Bench ${{ matrix.crate }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        crate:
          - arrow
          - arrow-array
          - arrow-avro
          - arrow-buffer
          - arrow-cast
          - arrow-ipc
          - arrow-json
          - arrow-schema
          - parquet
          - parquet-variant
          - parquet-variant-compute
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build benchmarks
        # Every shard builds the same full workspace with the same
        # feature set. Keeping the build command identical across
        # shards (rather than per-crate -p + per-crate features) keeps
        # rust-cache keys stable and dodges the cross-crate-feature
        # restriction cargo enforces when -p limits the build set.
        # The --features list enables every feature that any workspace
        # bench target gates behind `required-features`; without these
        # those bench targets silently aren't built.
        run: |
          cargo codspeed build --workspace \
            --features arrow/test_utils,arrow-schema/ffi,parquet/test_common,parquet/experimental,parquet/async,parquet/object_store

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.crate }}
